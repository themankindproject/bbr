name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   archive: tar.gz }
          - { os: macos-15-intel,  target: x86_64-apple-darwin,        archive: tar.gz }
          - { os: macos-14,       target: aarch64-apple-darwin,       archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     archive: zip }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bbr dist/
          cp README.md LICENSE dist/
          tar -czf bbr-${{ matrix.target }}.tar.gz -C dist .
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/bbr.exe dist/
          Copy-Item -Path README.md, LICENSE -Destination dist/
          Compress-Archive dist/* bbr-${{ matrix.target }}.zip

      - name: Generate shell completions
        shell: bash
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            BIN="./target/${{ matrix.target }}/release/bbr.exe"
          else
            BIN="./target/${{ matrix.target }}/release/bbr"
          fi
          $BIN completion bash > bbr.bash
          $BIN completion zsh  > bbr.zsh
          $BIN completion fish > bbr.fish

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            bbr-${{ matrix.target }}.${{ matrix.archive }}
            bbr.bash
            bbr.zsh
            bbr.fish
          generate_release_notes: true

  checksums:
    name: Publish checksums
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --pattern 'bbr-*.tar.gz' \
            --pattern 'bbr-*.zip'

      - name: Generate checksums.txt
        run: |
          cd assets
          sha256sum bbr-*.tar.gz bbr-*.zip | sort > ../checksums.txt
          cat ../checksums.txt

      - name: Upload checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" checksums.txt \
            --repo "${{ github.repository }}" \
            --clobber
